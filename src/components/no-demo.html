<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404: Project on Vacation</title>

  <link rel="icon" type="image/png" href="../public/logo5.png">
  <link rel="stylesheet" href="../Styles/no-demo.css">

  <style>
    .hamburger span {
      background: silver !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      border-radius: 5px;
    }

    .nav-list {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .nav-list li a {
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <nav>

      <ul class="nav-list">
        <li><a href="../index.html">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="projects.html">PROJECTS</a></li>
        <li><a href="contact.html">CONTACT</a></li>
      </ul>

      <!-- HAMBURGER -->
      <div class="hamburger" id="hamburger-menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </nav>
  </header>

  <!-- YOUR PAGE CONTENT -->
  <main>
    <h1>404 - Project on Vacation</h1>
  </main>

  <!-- EXTERNAL JS -->
  <script src="../scripts/script.js"></script>

  <!-- MOBILE NAV SCRIPT -->
  <script>
    function updateHamburgerDisplay() {

      const width = window.innerWidth;
      const height = window.innerHeight;

      const navList = document.querySelector('.nav-list');
      const hamburger = document.getElementById('hamburger-menu');

      if (!navList || !hamburger) return;

      // Portrait Mode
      if (width < height) {

        hamburger.style.display = 'flex';
        navList.style.display = 'none';

      } else {

        hamburger.style.display = 'none';
        navList.style.display = 'flex';
        navList.style.flexDirection = 'row';
      }
    }

    window.addEventListener('resize', updateHamburgerDisplay);

    window.addEventListener('DOMContentLoaded', function () {

      updateHamburgerDisplay();

      const hamburger = document.getElementById('hamburger-menu');
      const navList = document.querySelector('.nav-list');

      if (hamburger && navList) {

        hamburger.addEventListener('click', function () {

          const currentDisplay = getComputedStyle(navList).display;

          // CLOSE MENU
          if (currentDisplay === 'flex') {

            navList.style.display = 'none';

          }

          // OPEN MENU
          else {

            navList.style.display = 'flex';
            navList.style.flexDirection = 'column';

            navList.style.background = '#111';
            navList.style.position = 'absolute';

            navList.style.top = '60px';
            navList.style.right = '20px';

            navList.style.zIndex = '1000';

            navList.style.borderRadius = '8px';

            navList.style.padding = '15px 20px';

            navList.style.gap = '15px';
          }
        });
      }
    });
  </script>

</body>

</html>
